services:

  # Apache Storm components
  # - Zookeeper coordinates the communication between Nimbus and the Supervisors
  zookeeper:
    image: zookeeper:${ZOOKEEPER_VERSION:-3.9.3}
    container_name: zookeeper
    restart: always

  # - the daemon Nimbus runs on the master node
  storm-nimbus:
    image: storm:${STORM_VERSION:-2.8.4}
    container_name: nimbus
    hostname: nimbus
    command: storm nimbus
    depends_on:
      - zookeeper
    links:
      - zookeeper
    ports:
      - 6627:6627
    restart: always

  # - the Supervisors run on the worker nodes
  storm-supervisor:
    image: storm:${STORM_VERSION:-2.8.4}
    container_name: supervisor
    command: storm supervisor -c worker.childopts=-Xmx%HEAP-MEM%m
    depends_on:
      - zookeeper
      - storm-nimbus
    links:
      - zookeeper
      - storm-nimbus:nimbus
    # supervisor launches the worker processes
    # which need to be able to access
    # - (in case a indexing topology is run) the
    #   OpenSearch (http://opensearch:9200/) and
      - opensearch-sc
    #   Solr (http://solr:8983/) containers
      - solr
    # - and the WARC input and output for the WARC-rewrite topology
    volumes:
      - ${WARCINPUT:-./warcdata}:/data/input
      - ${WARCOUTPUT:-./warcoutput}:/data/warc
    restart: always

  # - the Storm UI provides diagnostics about the Storm cluster
  storm-ui:
    image: storm:${STORM_VERSION:-2.8.4}
    container_name: ui
    command: storm ui
    depends_on:
      - storm-nimbus
    links:
      - storm-nimbus:nimbus
    ports:
      - "127.0.0.1:8080:8080"
    restart: always

  opensearch-sc:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-2.19.4}
    container_name: opensearch-sc
    environment:
      - cluster.name=opensearch-sc-cluster
      - node.name=opensearch-sc
      - discovery.type=single-node
      - bootstrap.memory_lock=true # along with the memlock settings below, disables swapping
      - "OPENSEARCH_JAVA_OPTS=-Xms4G -Xmx4G"
      - plugins.security.disabled=true
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    volumes:
      - ${OPENSEARCHDATA:-./opensearchdata}:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536 # maximum number of open files for the OpenSearch user, set to at least 65536 on modern systems
        hard: 65536
    ports:
      - "127.0.0.1:9200:9200" # REST API

  opensearch-dashboard:
    image: opensearchproject/opensearch-dashboards:${OPENSEARCH_VERSION:-2.19.4}
    container_name: dashboard
    ports:
      - "127.0.0.1:5601:5601"
    expose:
      - "5601"
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch-sc:9200"]'
      - "DISABLE_SECURITY_DASHBOARDS_PLUGIN=true" # disables security dashboards plugin in OpenSearch Dashboards

  # Apache Solr
  solr:
    image: solr:${SOLR_VERSION:-9.10.1}
    container_name: solr
    ports:
      - "8983:8983"
    volumes:
      - ${STORM_CRAWLER_SOLR_CONF:-./storm-crawler/external/solr/cores}:/storm-crawler-solr-conf
    restart: always

  # - to launch a topology
  # - will exit on startup
  storm-crawler:
    build: .
    container_name: storm-crawler
    command: /bin/bash
    depends_on:
      - storm-nimbus
    links:
      - storm-nimbus:nimbus
    volumes:
      - ${WARCINPUT:-./warcdata}:/data/input
    restart: "no"

